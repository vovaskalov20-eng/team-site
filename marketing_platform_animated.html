
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#1D9E75;--teal-light:#E1F5EE;--teal-dark:#0F6E56;--blue:#378ADD;--purple:#7F77DD;--amber:#EF9F27;--pink:#D4537E;--red:#E24B4A;--gray:#888780}

.shell{display:grid;grid-template-columns:220px 1fr;min-height:700px;background:var(--color-background-tertiary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;animation:fadeIn .4s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1);transform-origin:bottom}}
@keyframes fillWidth{from{width:0}to{width:var(--w)}}
@keyframes countUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(29,158,117,.35)}50%{box-shadow:0 0 0 5px rgba(29,158,117,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes tooltipIn{from{opacity:0;transform:translateY(4px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.3}}

.sidebar{background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);padding:20px 0;display:flex;flex-direction:column;gap:2px}
.sidebar-logo{padding:0 20px 20px;font-size:15px;font-weight:500;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;transition:transform .2s ease,box-shadow .2s ease}
.sidebar-logo:hover .logo-icon{transform:rotate(-8deg) scale(1.08);box-shadow:0 4px 12px rgba(29,158,117,.4)}
.logo-icon svg{width:16px;height:16px;fill:#fff}

.nav-section{font-size:10.5px;font-weight:500;color:var(--color-text-tertiary);padding:14px 20px 3px;letter-spacing:.07em;text-transform:uppercase}

.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13.5px;color:var(--color-text-secondary);cursor:pointer;position:relative;transition:color .15s;user-select:none}
.nav-item::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%) scaleY(0);width:3px;height:60%;background:var(--teal);border-radius:0 3px 3px 0;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
.nav-item::after{content:'';position:absolute;inset:0;background:var(--color-background-secondary);opacity:0;transition:opacity .15s}
.nav-item:hover{color:var(--color-text-primary)}
.nav-item:hover::after{opacity:1}
.nav-item.active{color:var(--teal);font-weight:500}
.nav-item.active::before{transform:translateY(-50%) scaleY(1)}
.nav-item.active::after{background:#E1F5EE;opacity:1}
.nav-item:active{transform:scale(.98)}
.nav-icon{width:16px;height:16px;flex-shrink:0;position:relative;z-index:1;transition:transform .2s ease}
.nav-item:hover .nav-icon{transform:scale(1.15) translateX(1px)}
.nav-label{position:relative;z-index:1}

.tooltip-wrap{position:relative}
.tooltip{position:absolute;left:110%;top:50%;transform:translateY(-50%);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;font-size:12px;color:var(--color-text-primary);white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.1);pointer-events:none;opacity:0;z-index:100;transition:opacity .15s,transform .15s}
.tooltip::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--color-border-secondary)}
.tooltip-wrap:hover .tooltip{opacity:1;animation:tooltipIn .15s ease forwards}

.main{padding:24px;display:flex;flex-direction:column;gap:18px;overflow:hidden}

.topbar{display:flex;align-items:center;justify-content:space-between;animation:slideIn .3s ease}
.page-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.topbar-actions{display:flex;gap:8px}

.btn{padding:7px 14px;font-size:13px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);transition:background .15s,transform .12s,box-shadow .15s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:currentColor;opacity:0;transition:opacity .15s}
.btn:hover{background:var(--color-background-secondary);box-shadow:0 2px 8px rgba(0,0,0,.07);transform:translateY(-1px)}
.btn:active{transform:translateY(0) scale(.97)}
.btn-primary{background:var(--teal);border-color:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-dark);box-shadow:0 4px 14px rgba(29,158,117,.35)}

.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;cursor:default;transition:transform .2s ease,box-shadow .2s ease,background .15s;position:relative;overflow:hidden;animation:popIn .35s ease both}
.stat-card:nth-child(1){animation-delay:.05s}
.stat-card:nth-child(2){animation-delay:.1s}
.stat-card:nth-child(3){animation-delay:.15s}
.stat-card:nth-child(4){animation-delay:.2s}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.09);background:var(--color-background-primary)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--teal);transform:scaleX(0);transition:transform .3s ease;transform-origin:left}
.stat-card:hover::before{transform:scaleX(1)}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.stat-value{font-size:22px;font-weight:500;color:var(--color-text-primary);animation:countUp .4s ease both;animation-delay:.2s}
.stat-delta{font-size:12px;margin-top:4px}
.delta-up{color:var(--teal-dark)}
.delta-down{color:#993C1D}

.panels{display:grid;grid-template-columns:1fr 320px;gap:16px}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:18px 20px;animation:popIn .35s ease both;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.07)}
.card-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:14px}

.chart-wrap{height:180px;position:relative}
.bars{display:flex;align-items:flex-end;gap:8px;height:160px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-stack{display:flex;flex-direction:column;align-items:center;width:100%;transform-origin:bottom;animation:barGrow .5s cubic-bezier(.34,1.26,.64,1) both}
.bar-stack:nth-child(1){animation-delay:.1s}
.bar-stack:nth-child(2){animation-delay:.15s}
.bar-stack:nth-child(3){animation-delay:.2s}
.bar-stack:nth-child(4){animation-delay:.25s}
.bar-stack:nth-child(5){animation-delay:.3s}
.bar-stack:nth-child(6){animation-delay:.35s}
.bar-stack:nth-child(7){animation-delay:.4s}
.bar{width:100%;transition:filter .15s,opacity .15s;cursor:pointer}
.bar-col:hover .bar{filter:brightness(1.12)}
.bar-col:not(:hover) .bar{opacity:.85}
.bars:hover .bar-col:not(:hover) .bar{opacity:.55}
.bar-label{font-size:11px;color:var(--color-text-tertiary)}

.funnel{display:flex;flex-direction:column;gap:8px}
.funnel-row{display:flex;align-items:center;gap:10px;cursor:default}
.funnel-label{font-size:12px;color:var(--color-text-secondary);width:70px;flex-shrink:0}
.funnel-bar-wrap{flex:1;background:var(--color-background-secondary);border-radius:4px;height:20px;overflow:hidden;transition:transform .15s}
.funnel-row:hover .funnel-bar-wrap{transform:scaleY(1.1)}
.funnel-fill{height:100%;border-radius:4px;animation:fillWidth .7s cubic-bezier(.34,1.1,.64,1) both}
.funnel-row:nth-child(1) .funnel-fill{animation-delay:.1s}
.funnel-row:nth-child(2) .funnel-fill{animation-delay:.18s}
.funnel-row:nth-child(3) .funnel-fill{animation-delay:.26s}
.funnel-row:nth-child(4) .funnel-fill{animation-delay:.34s}
.funnel-row:nth-child(5) .funnel-fill{animation-delay:.42s}
.funnel-val{font-size:12px;font-weight:500;color:var(--color-text-primary);width:46px;text-align:right;flex-shrink:0}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tabs-mini{display:flex;gap:2px}
.tab-mini{padding:4px 10px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;border-radius:6px;transition:background .15s,color .15s;border:0.5px solid transparent}
.tab-mini:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.tab-mini.active{background:var(--teal-light);color:var(--teal-dark);border-color:rgba(29,158,117,.2);font-weight:500}

.campaign-list{display:flex;flex-direction:column;gap:8px}
.campaign-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;transition:background .15s,transform .15s,box-shadow .15s,border-color .15s;position:relative;overflow:hidden;animation:slideIn .3s ease both}
.campaign-row:nth-child(1){animation-delay:.1s}
.campaign-row:nth-child(2){animation-delay:.16s}
.campaign-row:nth-child(3){animation-delay:.22s}
.campaign-row:nth-child(4){animation-delay:.28s}
.campaign-row::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);background-size:200% 100%;opacity:0;transition:opacity .2s}
.campaign-row:hover{background:var(--color-background-secondary);transform:translateX(4px);box-shadow:0 2px 10px rgba(0,0,0,.06);border-color:var(--color-border-secondary)}
.campaign-row:hover::after{opacity:1;animation:shimmer .8s ease}
.campaign-row:active{transform:translateX(2px) scale(.99)}
.campaign-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:transform .2s;position:relative}
.campaign-row:hover .campaign-dot{transform:scale(1.35)}
.campaign-dot.active-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid currentColor;opacity:.3;animation:pulse 2s ease infinite}
.campaign-info{flex:1}
.campaign-name{font-size:13px;font-weight:500;color:var(--color-text-primary);transition:color .15s}
.campaign-row:hover .campaign-name{color:var(--teal-dark)}
.campaign-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.campaign-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;transition:transform .15s}
.campaign-row:hover .campaign-badge{transform:scale(1.05)}
.badge-active{background:#E1F5EE;color:#0F6E56}
.badge-draft{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.badge-paused{background:#FAEEDA;color:#854F0B}

.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:14px}
.tab{padding:7px 14px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-.5px;transition:color .15s,border-color .2s}
.tab:hover:not(.active){color:var(--color-text-primary)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500}

.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;animation:dotBlink 2.5s ease infinite}

.integration-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,border-color .15s;animation:popIn .3s ease both;position:relative;overflow:hidden}
.integration-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--color-border-secondary)}
.integration-card:active{transform:translateY(-2px) scale(.98)}

.progress-bar{height:6px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;animation:fillWidth .8s cubic-bezier(.34,1.1,.64,1) both}

select.btn{appearance:none;padding-right:24px;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}
</style>

<div class="shell">
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 16 16"><path d="M8 1L14 5V11L8 15L2 11V5L8 1Z"/></svg></div>
    MarketOS
  </div>
  <span class="nav-section">Головна</span>
  <div class="tooltip-wrap nav-item active" id="nav-overview" onclick="switchPage('overview')">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
    <span class="nav-label">Огляд</span>
    <div class="tooltip">Загальна статистика</div>
  </div>
  <div class="tooltip-wrap nav-item" id="nav-campaigns" onclick="switchPage('campaigns')">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4h12v1H2zM2 7.5h9v1H2zM2 11h11v1H2z"/></svg>
    <span class="nav-label">Кампанії</span>
    <div class="tooltip">Всі маркетинг-кампанії</div>
  </div>
  <div class="tooltip-wrap nav-item" id="nav-analytics" onclick="switchPage('analytics')">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="9" width="3" height="5"/><rect x="6.5" y="5" width="3" height="9"/><rect x="11" y="2" width="3" height="12"/></svg>
    <span class="nav-label">Аналітика</span>
    <div class="tooltip">Метрики та звіти</div>
  </div>
  <span class="nav-section">Інструменти</span>
  <div class="tooltip-wrap nav-item" id="nav-audience" onclick="switchPage('audience')">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-3 2-4.5 5-4.5s5 1.5 5 4.5H1z"/><circle cx="12" cy="5" r="2"/><path d="M12 9.5c1.5 0 3 .8 3 3.5h-3"/></svg>
    <span class="nav-label">Аудиторія</span>
    <div class="tooltip">Контакти та сегменти</div>
  </div>
  <div class="tooltip-wrap nav-item" id="nav-content" onclick="switchPage('content')">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="2" rx="1"/><rect x="2" y="6" width="8" height="2" rx="1"/><rect x="2" y="10" width="10" height="2" rx="1"/></svg>
    <span class="nav-label">Контент</span>
    <div class="tooltip">Матеріали та планування</div>
  </div>
  <div class="tooltip-wrap nav-item" id="nav-integrations" onclick="switchPage('integrations')">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="4" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 8h3" stroke="currentColor" stroke-width="1.5"/></svg>
    <span class="nav-label">Інтеграції</span>
    <div class="tooltip">Підключені сервіси</div>
  </div>
  <span class="nav-section">Система</span>
  <div class="tooltip-wrap nav-item" id="nav-settings">
    <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="2"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
    <span class="nav-label">Налаштування</span>
    <div class="tooltip">Профіль та параметри</div>
  </div>
</aside>

<main class="main" id="main-content"></main>
</div>

<script>
const weekData=[{l:'Пн',e:42,p:28,o:19},{l:'Вт',e:55,p:33,o:24},{l:'Ср',e:38,p:41,o:18},{l:'Чт',e:70,p:38,o:31},{l:'Пт',e:63,p:45,o:28},{l:'Сб',e:29,p:20,o:15},{l:'Нд',e:22,p:15,o:12}];

function renderBars(data){
  const wrap=document.getElementById('bar-chart');
  if(!wrap)return;
  const maxV=Math.max(...data.map(d=>d.e+d.p+d.o));
  wrap.innerHTML=`<div class="bars">${data.map((d,i)=>{
    const total=d.e+d.p+d.o,h=Math.round((total/maxV)*140);
    const eh=Math.round(d.e/total*h),ph=Math.round(d.p/total*h),oh=h-eh-ph;
    return`<div class="bar-col">
      <div class="bar-stack" style="height:${h}px;width:100%">
        <div class="bar" style="height:${eh}px;background:#1D9E75;border-radius:${oh===0&&ph===0?'4px 4px':ph===0?'4px 4px':'0'} 0 0"></div>
        <div class="bar" style="height:${ph}px;background:#378ADD;border-radius:${oh===0?'4px 4px':'0'} 0 0"></div>
        <div class="bar" style="height:${oh}px;background:#7F77DD;border-radius:4px 4px 0 0"></div>
      </div>
      <div class="bar-label">${d.l}</div>
    </div>`;
  }).join('')}</div>
  <div style="display:flex;gap:14px;margin-top:8px">
    ${[['#1D9E75','Email'],['#378ADD','Paid'],['#7F77DD','Organic']].map(([c,n])=>`<span style="font-size:11px;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${c}"></span>${n}</span>`).join('')}
  </div>`;
}

function switchTab(t,ctx){
  ctx.querySelectorAll('.tab-mini').forEach(el=>el.classList.remove('active'));
  ctx.querySelector('#tabmini-'+t).classList.add('active');
  const d=t==='month'?weekData.map(x=>({...x,e:x.e*4,p:x.p*4,o:x.o*4})):weekData;
  renderBars(d);
}

const pages={
overview:()=>`
  <div class="topbar">
    <div class="page-title">Огляд</div>
    <div class="topbar-actions">
      <button class="btn">Експорт</button>
      <button class="btn btn-primary">+ Нова кампанія</button>
    </div>
  </div>
  <div class="stats-grid">
    ${[['Охоплення','148 320','↑ 12% цього місяця','up'],['Конверсія','4.7%','↑ 0.8% за тиждень','up'],['Дохід','$83 400','↑ 9% цього місяця','up'],['CAC','$14.20','↑ $1.40 (гірше)','down']].map(([l,v,d,t])=>`
    <div class="stat-card">
      <div class="stat-label">${l}</div>
      <div class="stat-value">${v}</div>
      <div class="stat-delta delta-${t}">${d}</div>
    </div>`).join('')}
  </div>
  <div class="panels">
    <div class="card">
      <div class="section-header">
        <div class="card-title" style="margin:0">Кліки по каналах</div>
        <div class="tabs-mini" id="chart-tabs">
          <span class="tab-mini active" id="tabmini-week" onclick="switchTab('week',this.closest('.card'))">Тиждень</span>
          <span class="tab-mini" id="tabmini-month" onclick="switchTab('month',this.closest('.card'))">Місяць</span>
        </div>
      </div>
      <div class="chart-wrap" id="bar-chart"></div>
    </div>
    <div class="card">
      <div class="card-title">Воронка продажів</div>
      <div class="funnel">
        ${[['Відвідувачі','100%','#1D9E75','12 400'],['Ліди','68%','#5DCAA5','8 450'],['Контакти','40%','#9FE1CB','4 900'],['Угоди','18%','#1D9E75','2 200'],['Клієнти','9%','#085041','1 100']].map(([l,w,c,v])=>`
        <div class="funnel-row">
          <div class="funnel-label">${l}</div>
          <div class="funnel-bar-wrap"><div class="funnel-fill" style="--w:${w};width:${w};background:${c}"></div></div>
          <div class="funnel-val">${v}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="section-header">
      <div class="card-title" style="margin:0">Активні кампанії</div>
      <button class="btn" style="font-size:12px;padding:5px 10px">Всі →</button>
    </div>
    <div class="campaign-list">
      ${[['Весняний розпродаж — Email','#1D9E75','active','Запущено 24 берез. · 38 400 одержувачів','Активна'],['Ретаргетинг — Facebook Ads','#378ADD','active','Запущено 20 берез. · $2 400 витрачено','Активна'],['SEO-контент Q2','#EF9F27','draft','Редагується · 6 статей у черзі','Чернетка'],['A/B тест — Landing Page','#D4537E','paused','Призупинено · Варіант B +14% CR','Пауза']].map(([n,c,b,m,bl])=>`
      <div class="campaign-row">
